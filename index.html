<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />
    <script defer src="JavaScript/index.js"></script>
    <title>Frontend Mentor | Conference ticket generator</title>
  </head>
  <body>
    <section>
      <header>
        <img src="images/logo-full.svg" alt="logo" />
      </header>
      <main>
        <div class="header-text">
          <h1>Your Journey to Coding Conf 2025 Starts Here !</h1>
          <p>secure your spot at next year's biggest coding conference.</p>
        </div>
        <div class="data-processing-section">
          <p class="upload-avatar-info">upload Avatar</p>
          <div draggable="true" class="drag">
            <img
              src="images/icon-upload.svg"
              alt="upload-image-icon"
              width="35"
              height="40"
            />
            <label for="image">Drag and Drop or click to upload</label>
            <input
              type="file"
              name=""
              id="image"
              accept="image/jpeg, image/png"
            />
          </div>
          <div class="upload-warning-info">
            <img src="images/icon-info.svg" alt="" />
            <span>upload your phot(JPEG or PNG size: 580KB).</span>
          </div>
          <form action="">
            <div class="input-group">
              <label for="full-names">Full Names</label>
              <input type="text" id="full-names" />
            </div>
            <div class="input-group">
              <label for="email-address">Email Address</label>
              <input
                type="text"
                id="email-address"
                placeholder="example@gmail.com"
              />
            </div>
            <div class="input-group">
              <label for="github-names">GitHub Username</label>
              <input
                type="text"
                id="github-names"
                placeholder="@yourusername"
              />
            </div>
            <button>generate my ticket</button>
          </form>
        </div>
      </main>
      <div class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a
        >. Coded by <a href="#">Your Name Here</a>.
      </div>
    </section>
  </body>
</html>
